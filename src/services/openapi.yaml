openapi: 3.0.3
info:
  title: Gamified Evidence-Based Nursing API
  description: |
    RESTful API for the Gamified Evidence-Based Nursing application — a Spring Boot backend
    that powers a gamified learning experience for nursing students. Teams progress through
    themed rooms (Room of Knowledge, Room of Abstracts, Room of Analytics, Room of Science Battle)
    answering evidence-based nursing questions.

    ## Authentication
    All endpoints require a valid JWT Bearer token in the `Authorization` header.
    Tokens are obtained via the register or authenticate endpoints and expire after **1 hour**.

    ## Game Flow
    1. An admin **creates a game** — 5 teams (one per mission) are generated automatically.
    2. Each team starts in status `READY` at location `START`.
    3. Teams progress through rooms: `START` → `ROOM_OF_KNOWLEDGE` → `ROOM_OF_ABSTRACTS`
       → `ROOM_OF_ANALYTICS` → `ROOM_OF_SCIENCE_BATTLE` → `LAST_QUIZ` → `END_STATE`.
    4. In each room, teams retrieve and answer questions within a timer.

    ## Error Handling
    Error responses follow a consistent structure across all endpoints. Validation errors (400)
    include field-level detail; authentication/authorization errors (401/403) return minimal
    information to avoid leaking security details.

    ## Naming Conventions
    - URL paths use **kebab-case** (e.g., `/api/game/create`).
    - Enum values use **UPPER_SNAKE_CASE**.
    - JSON fields use **camelCase**.

    ## WebSockets
    The application uses WebSockets (via STOMP) for real-time notifications.
    - **Handshake Endpoint:** `/ws` (supports SockJS)
    - **Authentication:** Must provide a valid JWT in the `Authorization` header during the STOMP `CONNECT` frame.
    - **Topics:**
      - `/topic/analytics/submissions`: Admins can subscribe to this topic to receive real-time notifications when a team submits their answers in the Room of Analytics.
      - `/topic/mission/analytics/{mission-name}/feedback`: Teams can subscribe to this topic to receive real-time feedback when an admin approves or rejects their analytics answers. Replace `{mission-name}` with the team's actual mission name (e.g., "mission1").
  version: 1.0.0
  contact:
    name: GamifiedEvidenceBasedNursing Team

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Authentication
    description: User registration and login — public endpoints (no JWT required)
  - name: Games
    description: Game session lifecycle — create, query, and manage game sessions
  - name: Admin
    description: Admin operations — check for existing admins
  - name: Admin Dashboard
    description: Admin dashboard operations — managing team submissions and feedback
  - name: Landing Page
    description: Landing page endpoints — check game status and show missions
  - name: Entering Mission
    description: Mission entry endpoints — teams enter the game with their chosen mission
  - name: Room of Knowledge
    description: Room of Knowledge specific endpoints — verify answers and get results
  - name: Room of Abstracts
    description: Room of Abstracts specific endpoints — verify answers and track progress
  - name: Proceed to Next Room
    description: Proceed to next room endpoints — advance through Room of Abstracts, Analytics, and Science Battle
  - name: Room of Analytics
    description: Room of Analytics specific endpoints
  - name: Room of Science Battle
    description: Room of Science Battle specific endpoints
  - name: Room Time
    description: Room Time specific endpoints — calculate remaining time for a room
  - name: WebSockets
    description: WebSocket endpoints and real-time notifications

paths:
  # ──────────────────────────────────────────────
  # Authentication
  # ──────────────────────────────────────────────
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: |
        Creates a new user account and returns a JWT token.
      operationId: register
      requestBody:
        description: Username and password for the new account
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            example:
              username: "nurse.jane"
              password: "SecureP@ss123"
      responses:
        '200':
          description: Registration successful — JWT token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login as a user
      description: |
        Authenticates an existing user and returns a JWT token.
      operationId: login
      requestBody:
        description: User credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/authenticate:
    post:
      tags:
        - Authentication
      summary: Authenticate an existing user
      description: |
        Alias for `/auth/login`. Authenticates an existing user and returns a JWT token.
      operationId: authenticate
      requestBody:
        description: User credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user (API prefix)
      description: |
        Alias for `/auth/register`.
      operationId: registerApi
      requestBody:
        description: User credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login as a user (API prefix)
      description: |
        Alias for `/auth/login`.
      operationId: loginApi
      requestBody:
        description: User credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/authenticate:
    post:
      tags:
        - Authentication
      summary: Authenticate a user (API prefix)
      description: |
        Alias for `/auth/authenticate`.
      operationId: authenticateApi
      requestBody:
        description: User credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # Admin
  # ──────────────────────────────────────────────
  /api/admin/isThereAdmin:
    get:
      tags:
        - Admin
      summary: Check if any administrator exists
      description: |
        Returns true if at least one administrator exists in the system.
      operationId: isThereAdmin
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                type: boolean
              example: true

  /api/admin/submission/analytics:
    post:
      tags:
        - Admin Dashboard
      summary: Submit feedback for an analytics submission
      description: |
        Allows an admin to provide feedback (approve/reject) for open questions in a team's analytics submission.
      operationId: analyticsSubmissionFeedback
      security:
        - bearerAuth: []
      requestBody:
        description: Feedback for the analytics submission
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsSubmissionFeedbackDto'
            example:
              roomId: 3
              questions:
                - questionId: 1
                  answer: "Increased heart rate"
                  approved: true
                - questionId: 2
                  answer: "Elevated blood pressure"
                  approved: false
      responses:
        '200':
          description: Feedback submitted successfully
          content:
            text/plain:
              schema:
                type: string
              example: "Feedback processed successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # Games
  # ──────────────────────────────────────────────
  /api/game/create:
    post:
      tags:
        - Games
      summary: Create a new game session
      description: |
        Initialises a new game session.
      operationId: createGame
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Game session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponseDto'
              example:
                gameId: 1
                teamPasswords:
                  - teamId: 1
                    mission: "Wound Care for Pressure Ulcers"
                    password: "abcd"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────
  # Landing Page
  # ──────────────────────────────────────────────
  /api/game/landing:
    get:
      tags:
        - Landing Page
      summary: Check if a game is currently running
      description: |
        Returns true if there is at least one game session that has started and not yet finished.
      operationId: isGameRunning
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                type: boolean
              example: true

  /api/game/landing/missions:
    get:
      tags:
        - Landing Page
      summary: Get available missions for landing page
      description: |
        Returns a list of available missions for team selection.
      operationId: showMissions
      responses:
        '200':
          description: Missions retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LandingPageResponse'
              example:
                gameId: 1
                missions:
                  - missionId: 1
                    missionName: "Wound Care for Pressure Ulcers"
                  - missionId: 2
                    missionName: "Fall Prevention in Geriatrics"

  /api/game/landing/session-id:
    get:
      tags:
        - Landing Page
      summary: Get the current game session ID
      description: |
        Returns the ID of the currently active game session.
      operationId: getGameSessionId
      responses:
        '200':
          description: Game session ID retrieved
          content:
            application/json:
              schema:
                type: integer
                format: int64
              example: 1
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Entering Mission
  # ──────────────────────────────────────────────
  /api/game/mission/enter:
    post:
      tags:
        - Entering Mission
      summary: Enter the game with a mission
      description: |
        Allows a team to enter the game by selecting their mission.
      operationId: enterMission
      requestBody:
        description: Mission entry request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnteringGameRequest'
            example:
              password: "GameRoom42"
              gameId: 1
              missionId: 1
      responses:
        '200':
          description: Successfully entered mission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnteringGameResponse'
              example:
                missionId: 1
                roomId: 1
                timer: 300
                questions:
                  - questionId: 1
                    question: "What is the primary sign of a pressure ulcer?"
                    answers:
                      - answerId: 1
                        answer: "Redness"
                      - answerId: 2
                        answer: "Blue tint"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Room of Knowledge
  # ──────────────────────────────────────────────
  /api/rooms/roomofknowledge/isTheAnswerCorrect:
    put:
      tags:
        - Room of Knowledge
      summary: Verify if an answer is correct (Room of Knowledge)
      description: |
        Checks if a selected answer is correct for Room of Knowledge.
      operationId: isTheAnswerCorrect
      requestBody:
        description: Answer verification request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyAnswerDto'
            example:
              questionId: 1
              answerId: 1
              roomId: 1
      responses:
        '200':
          description: Answer verification result
          content:
            application/json:
              schema:
                type: boolean
              example: true

  /api/rooms/roomofknowledge/{roomId}/question/{questionId}/answer/{answerId}:
    get:
      tags:
        - Room of Knowledge
      summary: Verify if an answer is correct for a specific question (Room of Knowledge)
      description: |
        Checks if a selected answer is correct for a given question in the Room of Knowledge.
      operationId: verifyAnswer
      parameters:
        - name: roomId
          in: path
          required: true
          description: ID of the room
          schema:
            type: integer
            format: int64
            example: 1
        - name: questionId
          in: path
          required: true
          description: ID of the question
          schema:
            type: integer
            format: int64
            example: 1
        - name: answerId
          in: path
          required: true
          description: ID of the answer
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Answer verification result
          content:
            application/json:
              schema:
                type: boolean
              example: true

  /api/rooms/roomofknowledge/getResult:
    get:
      tags:
        - Room of Knowledge
      summary: Get result for Room of Knowledge
      description: |
        Returns the result for the Room of Knowledge room including progress and key.
      operationId: getResult
      parameters:
        - name: roomId
          in: query
          required: true
          description: ID of the room
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Room result retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultDto'
              example:
                progress: 80
                key: "KEY-123"

  /api/rooms/howmuchtimedowehave:
    get:
      tags:
        - Room Time
      summary: Get how much time is left for a room
      description: |
        Calculates and returns the remaining minutes and seconds for a given room.
      operationId: getHowMuchTimeDoWeHave
      parameters:
        - name: roomId
          in: query
          required: true
          description: ID of the room
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Remaining time retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomTimeResponse'
              example:
                minutes: 10
                seconds: 30

  # ──────────────────────────────────────────────
  # Retry Rooms
  # ──────────────────────────────────────────────
  /api/rooms/retry/knowledge:
    put:
      tags:
        - Room of Knowledge
      summary: Retry Room of Knowledge
      description: |
        Resets the progress of a specific room in the Room of Knowledge to 0.
      operationId: retryRoomOfKnowledge
      parameters:
        - name: roomId
          in: query
          required: true
          description: ID of the room to reset
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Room progress reset successfully
          content:
            application/json:
              schema:
                type: integer
                example: 0
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/rooms/retry/abstracts:
    put:
      tags:
        - Room of Abstracts
      summary: Retry Room of Abstracts
      description: |
        Resets the progress of a specific room in the Room of Abstracts to 0.
      operationId: retryRoomOfAbstracts
      parameters:
        - name: roomId
          in: query
          required: true
          description: ID of the room to reset
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Room progress reset successfully
          content:
            application/json:
              schema:
                type: integer
                example: 0
        '400':
          $ref: '#/components/responses/BadRequest'

  # ──────────────────────────────────────────────
  # Room of Abstracts
  # ──────────────────────────────────────────────
  /api/rooms/roomofabstracts/verify:
    post:
      tags:
        - Room of Abstracts
      summary: Verify answers for Room of Abstracts
      description: |
        Verifies the team's selected answers for the Room of Abstracts.
      operationId: verifyRoomOfAbstractsAnswers
      requestBody:
        description: Verify answers request for Room of Abstracts
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRoomOfAbstractsAnswersDto'
            example:
              roomId: 1
              missionId: 1
              answers:
                - questionId: 1
                  answerId: 1
                - questionId: 2
                  answerId: 2
      responses:
        '200':
          description: Answers verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultDto'
              example:
                progress: 100
                key: "SECRET-KEY"

  # ──────────────────────────────────────────────
  # Proceed to Next Room
  # ──────────────────────────────────────────────
  /api/game/proceed/abstracts:
    post:
      tags:
        - Proceed to Next Room
      summary: Proceed to the Room of Abstracts
      description: |
        Advances a team from Room of Knowledge to Room of Abstracts.
      operationId: proceedToTheRoomOfAbstracts
      requestBody:
        description: Proceed request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProceedDto'
            example:
              roomId: 1
      responses:
        '200':
          description: Proceeded to next room successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponseDto'
              example:
                roomId: 2
                missionId: 1
                mainQuestion: "Welcome to Room of Abstracts"
                docs:
                  - "/images/abstracts.jpg"
                questions:
                  - questionId: 1
                    question: "What is the main topic?"
                    answers:
                      - answerId: 1
                        answer: "Topic A"
                      - answerId: 2
                        answer: "Topic B"

  /api/game/proceed/analytics:
    post:
      tags:
        - Proceed to Next Room
        - Room of Analytics
      summary: Proceed to the Room of Analytics
      description: |
        Advances a team from Room of Abstracts to Room of Analytics.
      operationId: proceedToTheRoomOfAnalytics
      requestBody:
        description: Proceed request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProceedDto'
            example:
              roomId: 2
      responses:
        '200':
          description: Proceeded to Room of Analytics successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponseDto'
              example:
                roomId: 3
                missionId: 1
                mainQuestion: "Welcome to Room of Analytics"
                docs:
                  - "/images/analytics.jpg"
                questions:
                  - questionId: 1
                    question: "What does the data show?"
                    answers:
                      - answerId: 1
                        answer: "Trend A"
                      - answerId: 2
                        answer: "Trend B"

  /api/rooms/roomofanalytics/submit:
    post:
      tags:
        - Room of Analytics
      summary: Submit answers for Room of Analytics
      description: |
        Submits the team's selected answers for the open questions and the Level of Evidence question in the Room of Analytics.
      operationId: submitAnalytics
      requestBody:
        description: Submission request for Room of Analytics
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionDto'
            example:
              roomId: 3
              levelofEvidenceQuestionId: 10
              levelofEvidencAnswer: "Level I"
              openQuestions:
                - questionId: 1
                  answer: "Increased heart rate"
                - questionId: 2
                  answer: "Elevated blood pressure"
      responses:
        '200':
          description: Analytics submitted successfully, includes current progress and if level of evidence answer was correct
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponseDto'
              example:
                progress: 20
                levelOfEvidenceApproved: true
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/rooms/roomofanalytics/results:
    get:
      tags:
        - Room of Analytics
      summary: Get results for Room of Analytics
      description: |
        Returns the current progress and the room key if all questions are correctly answered.
      operationId: getAnalyticsResults
      parameters:
        - name: roomId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 3
        - name: missionId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultDto'
              example:
                progress: 100
                key: "K-Y"
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/game/proceed/scienebattle:
    post:
      tags:
        - Proceed to Next Room
        - Room of Science Battle
      summary: Proceed to the Room of Science Battle
      description: |
        Advances a team from Room of Analytics to Room of Science Battle.
      operationId: proceedToTheRoomOfScienceBattle
      requestBody:
        description: Proceed request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProceedDto'
            example:
              roomId: 3
      responses:
        '200':
          description: Proceeded to Room of Science Battle successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponseDto'
              example:
                roomId: 4
                missionId: 1
                mainQuestion: "Welcome to Room of Science Battle"
                docs:
                  - "/images/science-battle.jpg"
                questions:
                  - questionId: 1
                    question: "What is the evidence?"
                    answers:
                      - answerId: 1
                        answer: "Evidence A"
                      - answerId: 2
                        answer: "Evidence B"

  # ──────────────────────────────────────────────
  # WebSockets
  # ──────────────────────────────────────────────
  /ws:
    get:
      tags:
        - WebSockets
      summary: WebSocket handshake endpoint
      description: |
        Endpoint for establishing a WebSocket connection using STOMP.
        Supports SockJS fallback.
        Requires a JWT in the `Authorization` header of the STOMP `CONNECT` frame.
      responses:
        '101':
          description: Switching Protocols

# ════════════════════════════════════════════════
# Reusable Components
# ════════════════════════════════════════════════
components:
  # ── Security Schemes ──────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained from `/auth/register` or `/auth/authenticate`.
        Include in the `Authorization` header as `Bearer <token>`.
        Tokens expire after 1 hour (3 600 000 ms).

  # ── Reusable Responses ────────────────────────
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ── Schemas ───────────────────────────────────
  schemas:
    # ── Authentication ──────────────────────────
    AuthRequest:
      type: object
      description: Credentials for user registration or authentication
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Unique username for the account
          example: "nurse.jane"
        password:
          type: string
          format: password
          description: Account password
          example: "SecureP@ss123"

    AuthResponse:
      type: object
      description: Authentication result containing a JWT token and role information
      properties:
        token:
          type: string
          description: JWT Bearer token
          example: "eyJhbGciOiJIUzI1NiJ9..."
        isAdmin:
          type: boolean
          description: Whether the authenticated user has the ADMIN role
          example: true

    # ── Game ────────────────────────────────────

    GameResponseDto:
      type: object
      description: Response after creating a new game session
      properties:
        gameId:
          type: integer
          format: int64
          description: Unique identifier of the created game
          example: 1
        teamPasswords:
          type: array
          items:
            $ref: '#/components/schemas/TeamPassword'

    TeamPassword:
      type: object
      properties:
        teamId:
          type: integer
          format: int64
          example: 1
        mission:
          type: string
          example: "Wound Care for Pressure Ulcers"
        password:
          type: string
          example: "abcd"

    # ── Landing Page ────────────────────────────
    LandingPageResponse:
      type: object
      description: Response containing available missions
      properties:
        gameId:
          type: integer
          format: int64
          example: 1
        missions:
          type: array
          items:
            $ref: '#/components/schemas/MissionDto'

    MissionDto:
      type: object
      properties:
        missionId:
          type: integer
          format: int64
          example: 1
        missionName:
          type: string
          example: "Wound Care for Pressure Ulcers"

    # ── Entering Mission ────────────────────────
    EnteringGameRequest:
      type: object
      required:
        - password
        - gameId
        - missionId
      properties:
        password:
          type: string
          example: "GameRoom42"
        gameId:
          type: integer
          format: int64
          example: 1
        missionId:
          type: integer
          format: int64
          example: 1

    EnteringGameResponse:
      type: object
      properties:
        missionId:
          type: integer
          format: int64
          example: 1
        roomId:
          type: integer
          format: int64
          example: 1
        timer:
          type: integer
          format: int32
          example: 300
        questions:
          type: array
          items:
            $ref: '#/components/schemas/RoomOfKnowledgeQuestionsDto'

    RoomOfKnowledgeQuestionsDto:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
          example: 1
        question:
          type: string
          example: "What is the primary sign of a pressure ulcer?"
        answers:
          type: array
          items:
            $ref: '#/components/schemas/AnswerDto'

    AnswerDto:
      type: object
      properties:
        answerId:
          type: integer
          format: int64
          example: 1
        answer:
          type: string
          example: "Redness"

    # ── Room of Knowledge ───────────────────────
    VerifyAnswerDto:
      type: object
      required:
        - questionId
        - answerId
        - roomId
      properties:
        questionId:
          type: integer
          format: int64
          example: 1
        answerId:
          type: integer
          format: int64
          example: 1
        roomId:
          type: integer
          format: int64
          example: 1

    # ── Room of Analytics ───────────────────────
    SubmissionDto:
      type: object
      description: Request to submit answers for Room of Analytics
      required:
        - roomId
        - levelofEvidenceQuestionId
        - levelofEvidencAnswer
        - openQuestions
      properties:
        roomId:
          type: integer
          format: int64
          description: ID of the room
          example: 3
        levelofEvidenceQuestionId:
          type: integer
          format: int64
          description: ID of the Level of Evidence question
          example: 10
        levelofEvidencAnswer:
          type: string
          description: Answer for the Level of Evidence question
          example: "Level I"
        openQuestions:
          type: array
          items:
            $ref: '#/components/schemas/OpenQuestionSubmissionDto'

    SubmissionResponseDto:
      type: object
      description: Response after submitting analytics answers
      properties:
        progress:
          type: integer
          description: Current progress of the room
          example: 20
        levelOfEvidenceApproved:
          type: boolean
          description: Whether the Level of Evidence answer was correct
          example: true

    AnalyticsSubmissionFeedbackDto:
      type: object
      description: Request to provide feedback on an analytics submission
      required:
        - roomId
        - questions
      properties:
        roomId:
          type: integer
          format: int64
          description: ID of the room
          example: 3
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionFeedbackDto'

    QuestionFeedbackDto:
      type: object
      description: Feedback for a single open question
      required:
        - questionId
        - answer
        - approved
      properties:
        questionId:
          type: integer
          format: int64
          example: 1
        answer:
          type: string
          example: "Increased heart rate"
        approved:
          type: boolean
          example: true

    OpenQuestionSubmissionDto:
      type: object
      description: A single open question submission
      required:
        - questionId
        - answer
      properties:
        questionId:
          type: integer
          format: int64
          example: 1
        answer:
          type: string
          example: "Increased heart rate"

    # ── Room of Abstracts ───────────────────────
    RoomTimeResponse:
      type: object
      description: Response containing remaining minutes and seconds for a room
      properties:
        minutes:
          type: integer
          format: int64
          example: 10
        seconds:
          type: integer
          format: int64
          example: 30

    VerifyRoomOfAbstractsAnswersDto:
      type: object
      description: Request to verify answers for Room of Abstracts
      required:
        - roomId
        - missionId
        - answers
      properties:
        roomId:
          type: integer
          format: int64
          description: ID of the room
          example: 1
        missionId:
          type: integer
          format: int64
          description: ID of the mission
          example: 1
        answers:
          type: array
          items:
            $ref: '#/components/schemas/QuestionAnswerDto'

    QuestionAnswerDto:
      type: object
      description: A single question-answer pair
      required:
        - questionId
        - answerId
      properties:
        questionId:
          type: integer
          format: int64
          example: 1
        answerId:
          type: integer
          format: int64
          example: 1

    ResultDto:
      type: object
      description: Result of answer verification
      properties:
        progress:
          type: integer
          format: int32
          description: Progress percentage (0-100)
          example: 100
        key:
          type: string
          nullable: true
          description: The room key if progress is 100%, null otherwise
          example: "SECRET-KEY"

    # ── Proceed to Next Room ────────────────────
    ProceedDto:
      type: object
      required:
        - roomId
      properties:
        roomId:
          type: integer
          format: int64
          description: ID of the current room
          example: 1

    RoomResponseDto:
      type: object
      description: Response for proceeding to rooms
      properties:
        roomId:
          type: integer
          format: int64
          example: 2
        missionId:
          type: integer
          format: int64
          example: 1
        mainQuestion:
          type: string
          example: "Welcome to Room of Abstracts"
        docs:
          type: array
          items:
            type: string
        questions:
          type: array
          items:
            $ref: '#/components/schemas/TableQuestionDto'

    TableQuestionDto:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
          example: 1
        question:
          type: string
          example: "What is the main topic?"
        answers:
          type: array
          items:
            $ref: '#/components/schemas/AnswerDto'

    # ── WebSocket Notifications ─────────────────
    AdminNotificationDto:
      type: object
      description: Real-time notification for admins when a room of analytics is submitted
      required:
        - missionId
        - missionName
        - roomId
        - roomName
        - submittedAt
        - answers
      properties:
        missionId:
          type: integer
          format: int64
          example: 1
        missionName:
          type: string
          example: "Wound Care for Pressure Ulcers"
        roomId:
          type: integer
          format: int64
          example: 3
        roomName:
          type: string
          example: "Room of Analytics"
        submittedAt:
          type: string
          format: date-time
          example: "2026-03-24T10:00:00Z"
        answers:
          type: array
          items:
            $ref: '#/components/schemas/AnswerDetailDto'

    AnswerDetailDto:
      type: object
      description: Detailed answer for an open question
      required:
        - questionId
        - questionText
        - answerText
      properties:
        questionId:
          type: integer
          format: int64
          example: 1
        questionText:
          type: string
          example: "What is the primary sign of a pressure ulcer?"
        answerText:
          type: string
          example: "Persistent redness of the skin"

    AnalyticsFeedbackDto:
      type: object
      description: Real-time feedback sent to a team after admin reviews their analytics submission
      required:
        - roomId
        - missionName
        - progress
        - feedbackAt
        - questions
      properties:
        roomId:
          type: integer
          format: int64
          example: 3
        missionName:
          type: string
          description: Name of the mission
          example: "mission1"
        progress:
          type: integer
          example: 60
        feedbackAt:
          type: string
          format: date-time
          example: "2026-05-01T14:30:00Z"
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionFeedbackResultDto'

    QuestionFeedbackResultDto:
      type: object
      description: Result for a single question after admin review
      required:
        - questionId
        - approved
      properties:
        questionId:
          type: integer
          format: int64
          example: 1
        approved:
          type: boolean
          example: true
        answerText:
          type: string
          description: The accepted answer text; null when rejected
          example: "Increased heart rate"

    # ── Error ───────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-03-24T10:00:00Z"
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Validation failed"
        path:
          type: string
          example: "/api/games"
